name: "Deploy"

on:
  release:
    types: [published]

jobs: 
  docker:
    runs-on: ubuntu-latest 
    steps:
    - uses: actions/checkout@v4
    - uses: cachix/install-nix-action@v25
      with:
        nix_path: nixpkgs=channel:nixos-unstable
        extra_nix_config: |
            trusted-public-keys = cache.garnix.io:CTFPyKSLcx5RMJKfLo5EEPUObbA78b0YQ2DTCJXqr9g= cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY=
            substituters = https://cache.garnix.io https://cache.nixos.org/

    - name: Build Image
      run: nix develop -c just build-docker

    - name: Upload Image Artifact 
      uses: actions/upload-artifact@v4
      with:
        name: bin-docker-image 
        path: result
        retention-days: 1
  
  frontend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: cachix/install-nix-action@v25
      with:
        nix_path: nixpkgs=channel:nixos-unstable
        extra_nix_config: |
            trusted-public-keys = cache.garnix.io:CTFPyKSLcx5RMJKfLo5EEPUObbA78b0YQ2DTCJXqr9g= cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY=
            substituters = https://cache.garnix.io https://cache.nixos.org/



    - run: nix build .#frontend

    - name: Upload Frontend Bundle
      uses: actions/upload-artifact@v4
      with:
        name: frontend-bundle
        path: result
        retention-days: 1

  upload-docker:
    runs-on: ubuntu-latest
    needs: [frontend, docker]
    permissions:
      contents: read
      packages: write
    steps: 
    - name: Download Docker Image
      uses: actions/download-artifact@v4
      with:
        name: bin-docker-image

    - name: Load Docker Image
      run: docker load < result

    - name: Tag Image
      run: docker tag newsletter:latest ghcr.io/spa-stc/news:${{ github.event.release.tag_name }} 

    - name: Container Registry Login
      uses: docker/login-action@65b78e6e13532edd9afa3aa52ac7964289d1a9c1
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Push Docker Image To GHCR
      run: docker push ghcr.io/spa-stc/news:${{ github.event.release.tag_name }}
